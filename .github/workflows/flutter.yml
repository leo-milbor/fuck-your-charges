name: Flutter CI\n\non:  \n  pull_request:  \n    branches: [ main ]\n  push:  \n    branches: [ spec-agents-and-ui-tests ]\n\njobs:  \n  build:  \n    runs-on: ubuntu-latest\n    steps:  \n    - name: Checkout code  \n      uses: actions/checkout@v2  \n    - name: Set up Flutter  \n      uses: subosito/flutter-action@v2  \n      with:  \n        flutter-version: stable  \n    - name: Install dependencies  \n      run: flutter pub get  \n    - name: Analyze  \n      run: flutter analyze  \n    - name: Test  \n      run: flutter test  \n    - name: Test with coverage  \n      run: flutter test --coverage