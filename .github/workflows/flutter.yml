name: Flutter CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: stable
    - name: Install dependencies
      run: flutter pub get
    - name: Analyze
      run: flutter analyze
    - name: Test
      run: flutter test
    - name: Test with coverage
      run: flutter test --coverage
