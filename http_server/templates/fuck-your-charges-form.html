<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>Fuck your charges</title>
  <meta name="description"
    content="Fuck your charges helps group of friends figuring out how much each paid inclusive of tax when restaurant display only prices with no charges.">
</head>

<body>
  <h1>Fuck your charge!</h1>
  <section>
    <form action="calculate-charges" method="POST">
      <div>
        <label for="prices">Displayed price</label>
        <input name="prices" id="price" pattern="\d+\.?\d{0,2}(?:\s\d+\.?\d{0,2})*" required="true" />
      </div>
      <br />
      <button>Calculate charges</button>
    </form>
  </section>
</body>

</html>
